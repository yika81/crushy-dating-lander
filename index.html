<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Messages</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

.container {
  max-width:400px;
  margin:auto;
  padding:15px;
}

.header {
  text-align:center;
  font-size:22px;
  margin-top:20px;
  color:#ff3b3b;
}

.sub {
  text-align:center;
  font-size:14px;
  color:#ccc;
}

.chat {
  margin-top:20px;
}

.msg-row {
  display:flex;
  align-items:flex-start;
  margin-bottom:15px;
}

.avatar {
  width:45px;
  height:45px;
  border-radius:50%;
  margin-right:10px;
}

.msg {
  background:#1c1c1c;
  padding:10px;
  border-radius:10px;
  max-width:75%;
}

.typing {
  opacity:0.6;
  font-style:italic;
}

button {
  width:100%;
  padding:16px;
  font-size:18px;
  background:#ff2d55;
  color:white;
  border:none;
  border-radius:10px;
  margin-top:25px;
}

.popup {
  position:fixed;
  bottom:10px;
  left:10px;
  background:#222;
  padding:10px;
  border-radius:8px;
  font-size:12px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<div class="header">⚠️ 3 Unread Messages</div>
<div class="sub">Women near Johannesburg are waiting for your reply</div>

<div class="chat">

<div class="msg-row">
<img class="avatar" src="https://i.imgur.com/1X6vQ.jpg">
<div class="msg">Jessica: "Hey… are you ignoring me? 😘"</div>
</div>

<div class="msg-row">
<img class="avatar" src="https://i.imgur.com/2X7vQ.jpg">
<div class="msg">Amanda: "I saw your profile... you look interesting 😏"</div>
</div>

<div class="msg-row">
<img class="avatar" src="https://i.imgur.com/3X8vQ.jpg">
<div class="msg typing">Typing...</div>
</div>

</div>

<button onclick="step1()">See Who Messaged You →</button>

</div>

<script>

function step1(){
document.body.innerHTML = `
<div class="container">
<h2>Are you over 18?</h2>
<button onclick="step2()">Yes, continue</button>
</div>`;
}

function step2(){
document.body.innerHTML = `
<div class="container">
<h2>Who are you looking for?</h2>
<button onclick="go()">Women near you</button>
</div>`;
}

function go(){
window.location.href="https://t.mbjms.com/386006/3785/0?target=pops&po=6456&aff_sub5=SF_006OG000004lmDN";
}

/* notifications */
setInterval(function(){
var names = ["Amanda","Lisa","Chloe","Samantha"];
var name = names[Math.floor(Math.random()*names.length)];
var popup = document.createElement("div");
popup.className="popup";
popup.innerHTML = name + " just came online";
document.body.appendChild(popup);

setTimeout(()=>{popup.remove();},3000);
},4000);

</script>

</body>
</html>
