<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Messages</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

.container {
  padding:20px;
  max-width:400px;
  margin:auto;
}

.chat {
  margin-top:30px;
}

.msg {
  background:#222;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:inline-block;
}

.typing {
  opacity:0.6;
  font-style:italic;
}

button {
  width:100%;
  padding:15px;
  font-size:18px;
  background:#e50914;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:20px;
}

.popup {
  position:fixed;
  bottom:10px;
  left:10px;
  background:#222;
  padding:10px;
  border-radius:8px;
  font-size:12px;
  opacity:0.9;
  animation:fadein 1s;
}

@keyframes fadein {
  from {opacity:0;}
  to {opacity:0.9;}
}
</style>
</head>

<body>

<div class="container">

<h2>💬 New Message Received</h2>

<div class="chat" id="chat">
  <div class="msg">Jessica (2km away):</div>
  <div class="msg">"Hey… are you ignoring me? 😘"</div>
  <div class="msg typing">Typing...</div>
</div>

<button onclick="startFlow()">Read Message</button>

</div>

<script>

function startFlow(){
  document.body.innerHTML = `
  <div class="container">
    <h2>Are you over 18?</h2>
    <button onclick="step2()">YES</button>
  </div>`;
}

function step2(){
  document.body.innerHTML = `
  <div class="container">
    <h2>Who are you looking for?</h2>
    <button onclick="go()">Women</button>
  </div>`;
}

function go(){
  window.location.href="https://t.mbjms.com/386006/3785/0?target=pops&po=6456&aff_sub5=SF_006OG000004lmDN";
}

setInterval(function(){
  var names = ["Amanda","Lisa","Chloe","Samantha"];
  var name = names[Math.floor(Math.random()*names.length)];
  var popup = document.createElement("div");
  popup.className="popup";
  popup.innerHTML = name + " is online now (1km away)";
  document.body.appendChild(popup);

  setTimeout(()=>{popup.remove();},3000);
},4000);

</script>

</body>
</html>
